<main class="w-full h-full flex justify-center items-center px-6 overflow-y-scroll">
	<form
		class="w-full portrait:md:w-10/12 landscape:w-2/3 h-fit px-8 portrait:md:px-24 py-10 landscape:py-6 bg-my-glass backdrop-blur-md rounded-[32px] flex flex-col justify-center items-center gap-8"
		[formGroup]="resetPasswordFormGroup"
		(ngSubmit)="resetPasswordFormSubmit()">
		<div class="w-full flex flex-col landscape:flex-row justify-center items-center gap-4">
			<div class="w-full landscape:w-2/5 flex flex-col justify-center items-center">
				<img src="images/logos/lynx-logo.png" alt="lynx logo" class="w-40 md:w-60 lg:w-80 landscape:" />
				<h3 class="text-xl landscape:text-3xl text-white font-bold">Reset Password</h3>
			</div>
			<div class="w-full landscape:w-3/5 flex flex-col justify-center items-center gap-4">
				@if (error()) {
					<div class="w-full text-center">
						<p class="text-red-400 text-sm mb-2">{{ error() }}</p>
						<a routerLink="/auth/forgot-password" class="text-font-authSubtitle text-[12px] md:text-sm font-light leading-none"
							>Request a new reset link</a
						>
					</div>
				}
				<app-text-field [control]="formControls.password" placeholder="New Password" type="password" autoComplete="new-password" class="w-full" />
				<app-text-field
					[control]="formControls.confirmPassword"
					placeholder="Confirm Password"
					type="password"
					autoComplete="new-password"
					class="w-full" />
				<app-button text="Reset Password" [buttonType]="ButtonType.SUBMIT" [disabled]="resetPasswordFormGroup.invalid" [loading]="submitting()" />
			</div>
		</div>
		<div class="w-full flex justify-center items-center">
			<p class="text-font-primary text-[12px] md:text-sm font-light leading-none">Remember your password?&nbsp;</p>
			<a routerLink="/auth/login" class="text-font-authSubtitle text-[12px] md:text-sm font-light leading-none">Login here</a>
		</div>
	</form>
</main>
